# ==================================================================
# mazterCLOUD - Direccionador de recursos (edicion mini2, LIGERA)
#
# UNICA fuente de direccionamiento de la edicion. Los scripts del
# cliente descargan este archivo y lo OBEDECEN en cada ejecucion.
# mini2 es una edicion LIGERA: su canal ofrece menu + listas +
# superposiciones (fixes/pimazterart NO; van horneados en la imagen).
# Las vars de los modulos ausentes no se declaran a proposito.
#
# Fuente local versionada: P:\Claude\mazterCLOUD\publico
# (clon de github.com/PiMazter/mazterCLOUD). Editar aqui, luego
# git add + commit + push.
# ==================================================================

# --- Sistema (scripts del menu, textos, config, el propio menu) ---
RCLONE_REMOTE_SCRIPTS="r2:maztercloud/mini2/scripts"
RCLONE_REMOTE_TEXTOS="r2:maztercloud/mini2/textos"
RCLONE_REMOTE_CONFIG="r2:maztercloud/mini2/config"
RCLONE_REMOTE_MENU="r2:maztercloud/mini2/retropiemenu"

# --- Contenido curado ---
RCLONE_REMOTE_GAMELISTS="r2:maztercloud/mini2/contenido/gamelists"
# Superposiciones: el MANIFEST (suscripcion de la edicion) vive aqui;
# el ARTE vive UNA sola vez en el pool del catalogo (pool visual 2026-07-16).
RCLONE_REMOTE_SUPERPOSICIONES="r2:maztercloud/mini2/contenido/superposiciones"
RCLONE_REMOTE_POOL_SUPERPOSICIONES="r2:maztercloud/pool/superposiciones"

# --- Portero (N1) ---
PORTERO_URL="https://portero.pimazter.com/pase"
