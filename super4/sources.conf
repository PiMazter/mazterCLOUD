# ==================================================================
# mazterCLOUD - Direccionador de recursos (edicion super4)
#
# UNICA fuente de direccionamiento. Los scripts del cliente descargan
# este archivo y lo OBEDECEN en cada ejecucion; cambiar una linea aqui
# redirige a TODOS los equipos en su siguiente actualizacion, sin tocar
# el cliente. Los defaults de los scripts son solo red por si este
# archivo no se pudiera descargar.
#
# 2026-07-17: nace con el espacio de la edicion (plan de completitud;
# super4 = COMPLETA, canal entero). El cliente es el paquete
# multi-edicion (F5): la identidad la pone menu.conf (EDITION_KEY).
#
# Fuente local versionada: P:\Claude\mazterCLOUD\publico
# (clon de github.com/PiMazter/mazterCLOUD). Editar aqui, luego
# git add + commit + push.
# ==================================================================

# --- Sistema (scripts del menu, textos, config, el propio menu) ---
RCLONE_REMOTE_SCRIPTS="r2:maztercloud/super4/scripts"
RCLONE_REMOTE_TEXTOS="r2:maztercloud/super4/textos"
RCLONE_REMOTE_CONFIG="r2:maztercloud/super4/config"
RCLONE_REMOTE_MENU="r2:maztercloud/super4/retropiemenu"

# --- Contenido curado ---
RCLONE_REMOTE_GAMELISTS="r2:maztercloud/super4/contenido/gamelists"
RCLONE_REMOTE_PIMAZTERART="r2:maztercloud/super4/contenido/pimazterart"
# Pool visual: los CUADROS viven UNA sola vez en pool/; la var de arriba
# queda como root del MANIFEST (la suscripcion de la edicion).
RCLONE_REMOTE_POOL_PIMAZTERART="r2:maztercloud/pool/pimazterart"
RCLONE_REMOTE_SUPERPOSICIONES="r2:maztercloud/super4/contenido/superposiciones"
# Pool visual del catalogo: el ARTE de superposiciones vive UNA sola vez
# en pool/; la var de arriba queda como root del MANIFEST.
RCLONE_REMOTE_POOL_SUPERPOSICIONES="r2:maztercloud/pool/superposiciones"
# Payloads de PiMazterTOOLS (los consume el INSTALADOR de fixes).
RCLONE_REMOTE_PIMAZTERTOOLS="r2:maztercloud/super4/contenido/pimaztertools"

# --- Mejoras / ajustes ---
RCLONE_REMOTE_FIXES="r2:maztercloud/super4/fixes"

# --- Portero (N1) ---
# Caseta de acceso: los *_update.sh se presentan aqui y reciben un gafete
# temporal (credenciales R2 de solo lectura) para bajar de R2. El gafete
# cubre [<edicion>/, pool/].
PORTERO_URL="https://portero.pimazter.com/pase"
