# ==================================================================
# mazterCLOUD - Direccionador de recursos (edicion mazter4)
#
# UNICA fuente de direccionamiento. Los scripts del cliente descargan
# este archivo y lo OBEDECEN en cada ejecucion; cambiar una linea aqui
# redirige a TODOS los equipos en su siguiente actualizacion, sin tocar
# el cliente. Los defaults de los scripts son solo red por si este
# archivo no se pudiera descargar.
#
# 2026-07-13: renombre de la familia (ID mazter4_2 -> mazter4). Este es
# el direccionador CANONICO de la edicion; el archivo hermano en
# mazter4_2/sources.conf queda como PUENTE permanente para clientes
# pre-renombre y apunta a estas mismas rutas.
#
# Fuente local versionada: P:\Claude\mazterCLOUD\publico
# (clon de github.com/PiMazter/mazterCLOUD). Editar aqui, luego
# git add + commit + push.
# ==================================================================

# --- Sistema (scripts del menu, textos, config, el propio menu) ---
RCLONE_REMOTE_SCRIPTS="r2:maztercloud/mazter4/scripts"
RCLONE_REMOTE_TEXTOS="r2:maztercloud/mazter4/textos"
RCLONE_REMOTE_CONFIG="r2:maztercloud/mazter4/config"
RCLONE_REMOTE_MENU="r2:maztercloud/mazter4/retropiemenu"

# --- Contenido curado ---
RCLONE_REMOTE_GAMELISTS="r2:maztercloud/mazter4/contenido/gamelists"
RCLONE_REMOTE_PIMAZTERART="r2:maztercloud/mazter4/contenido/pimazterart"
# Pool visual v2 (2026-07-16): los CUADROS viven UNA sola vez en pool/; la var
# de arriba queda como root del MANIFEST (la suscripcion de la edicion).
RCLONE_REMOTE_POOL_PIMAZTERART="r2:maztercloud/pool/pimazterart"
RCLONE_REMOTE_SUPERPOSICIONES="r2:maztercloud/mazter4/contenido/superposiciones"
# Pool visual del catalogo (2026-07-16): el ARTE de superposiciones vive UNA
# sola vez en pool/; la var de arriba queda como root del MANIFEST (la
# suscripcion de la edicion). Clientes viejos ignoran esta var; el cliente
# nuevo cae al root del manifest si no llega (red de emergencia).
RCLONE_REMOTE_POOL_SUPERPOSICIONES="r2:maztercloud/pool/superposiciones"
# Payloads de PiMazterTOOLS (los consume el INSTALADOR de fixes; faltaba desde
# el origen — el default hardcodeado del instalador tapaba el hueco hasta el
# renombre. Incidente 2026-07-14: "paquete corrupto" en el parque).
RCLONE_REMOTE_PIMAZTERTOOLS="r2:maztercloud/mazter4/contenido/pimaztertools"

# --- Mejoras / ajustes ---
RCLONE_REMOTE_FIXES="r2:maztercloud/mazter4/fixes"

# --- Portero (N1, F4-bis) ---
# Caseta de acceso: los *_update.sh se presentan aqui y reciben un gafete
# temporal (credenciales R2 de solo lectura) para bajar de R2. Sin esta
# variable NO hay pase y el cliente usa su llave permanente (red de
# emergencia pre-rotacion). Worker creado y validado 2026-07-14 (dominio
# propio; firma local). LATIDO_URL quedo SUPERADA por el portero (el pase
# ya anota el latido).
PORTERO_URL="https://portero.pimazter.com/pase"
